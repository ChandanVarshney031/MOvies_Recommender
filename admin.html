<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch | Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <header>
            <div class="nav-header">
                <a href="index.html" class="nav-link">← Back to User Dashboard</a>
            </div>
            <h1>Admin Dashboard</h1>
            <p class="subtitle">Manage the movie database for CineMatch.</p>

            <!-- CSV Upload Controls -->
            <div class="upload-controls admin-panel" style="margin-top: 3rem; text-align: center; padding: 2rem; background: var(--card-bg); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05);">
                <h2>Upload Movie Data</h2>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">Upload a CSV file containing movie details (title, genres, rating, poster_path, etc.)</p>
                <input type="file" id="csvFileInput" accept=".csv" style="display: none;">
                <button id="uploadBtn" class="genre-tag"
                    style="background-color: var(--primary); border-color: var(--primary); font-size: 1.1rem; padding: 1rem 2rem;">
                    📂 Select CSV File
                </button>
                <p id="uploadStatus" style="font-size: 1rem; color: var(--text-secondary); margin-top: 1.5rem;"></p>
                
                <div id="statsContainer" style="margin-top: 2rem; display: none;">
                    <div style="display: flex; justify-content: center; gap: 2rem;">
                        <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px; min-width: 150px;">
                            <h3 style="color: var(--text-secondary); font-size: 0.9rem;">Total Movies</h3>
                            <p id="totalMoviesStat" style="font-size: 1.5rem; font-weight: 700; color: var(--accent-color);">0</p>
                        </div>
                    </div>
                    <button id="clearDataBtn" class="genre-tag" style="margin-top: 2rem; background: rgba(239, 68, 68, 0.2); border-color: transparent; color: #f87171;">
                        Clear Database
                    </button>
                </div>
            </div>
        </header>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="admin.js"></script>
</body>

</html>
